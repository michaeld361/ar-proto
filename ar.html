<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>McLaren Artura Spider — AR</title>
    <meta name="theme-color" content="#0A1628">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            background: #0A1628;
            color: #fff
        }

        #zappar-container {
            position: fixed;
            inset: 0;
            z-index: 1
        }

        #zappar-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important
        }

        .ar-hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            background: linear-gradient(180deg, rgba(10, 22, 40, 0.8), transparent)
        }

        .ar-close {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(16, 16, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer
        }

        #scan-prompt {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 12px 24px;
            background: rgba(10, 22, 40, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            white-space: nowrap;
            animation: pulse 2s ease-in-out infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.5
            }
        }

        #hotspot-layer {
            position: fixed;
            inset: 0;
            z-index: 55;
            pointer-events: none
        }

        .hs-btn {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: auto;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 60
        }

        .hs-ring {
            position: relative;
            width: 40px;
            height: 40px
        }

        .hs-ring-circle {
            position: absolute;
            inset: 0;
            border: 2px solid #FF8000;
            border-radius: 50%;
            animation: htPulse 2s ease-in-out infinite
        }

        .hs-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: #FF8000;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 128, 0, 0.7), 0 0 8px #FF8000
        }

        .hs-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(10, 22, 40, 0.88);
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px)
        }

        @keyframes htPulse {
            0% {
                transform: scale(0.85);
                opacity: 1
            }

            50% {
                transform: scale(1.35);
                opacity: 0.3
            }

            100% {
                transform: scale(0.85);
                opacity: 1
            }
        }

        .info-panel {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center
        }

        .info-panel.active {
            display: flex
        }

        .info-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px)
        }

        .info-card {
            position: relative;
            width: 100%;
            max-width: 480px;
            max-height: 70vh;
            overflow-y: auto;
            background: rgba(10, 22, 40, 0.96);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: none;
            border-radius: 24px 24px 0 0;
            padding: 20px 24px 24px;
            padding-bottom: max(60px, calc(env(safe-area-inset-bottom) + 60px));
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5)
        }

        .info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px
        }

        .info-accent {
            width: 40px;
            height: 3px;
            background: #FF8000;
            border-radius: 99px
        }

        .info-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            color: #fff
        }

        .info-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px
        }

        .info-desc {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.7)
        }

        .hidden {
            display: none !important
        }
    </style>
</head>

<body>
    <div id="zappar-container"></div>

    <div class="ar-hud">
        <div>
            <img src="/images/mclaren-logo.png" alt="McLaren" style="height:14px;width:auto">
            <div style="font-size:10px;font-weight:500;letter-spacing:3px;color:#FF8000">ARTURA SPIDER · AR</div>
        </div>
        <button class="ar-close" onclick="window.location.href='/'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" />
            </svg>
        </button>
    </div>

    <div id="scan-prompt">Initialising AR…</div>
    <div id="hotspot-layer" class="hidden"></div>

    <div class="info-panel" id="info-panel">
        <div class="info-backdrop" onclick="closePanel()"></div>
        <div class="info-card">
            <div class="info-header">
                <div class="info-accent"></div>
                <button class="info-close" onclick="closePanel()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="info-title" id="panel-title"></div>
            <div class="info-desc" id="panel-desc"></div>
        </div>
    </div>

    <script type="module" src="/src/zappar-ar.ts"></script>
</body>

</html>
