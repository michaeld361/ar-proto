<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>McLaren Artura Spider — AR View</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- MindAR + A-Frame (image tracking AR that works on iOS Safari) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
        }

        /* HUD overlay */
        .ar-hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.7) 0%, transparent 100%);
            pointer-events: auto;
        }

        .ar-close-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(16, 16, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
        }

        /* Scan prompt */
        #scan-prompt {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 12px 24px;
            background: rgba(16, 16, 16, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            white-space: nowrap;
            animation: scanPulse 2s ease-in-out infinite;
        }

        @keyframes scanPulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.5
            }
        }

        /* Hotspot buttons positioned via JS */
        .hs-btn {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: auto;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 60;
            transition: opacity 0.3s;
        }

        .hs-ring {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .hs-ring-circle {
            position: absolute;
            inset: 0;
            border: 2px solid #FF8000;
            border-radius: 50%;
            animation: htPulse 2s ease-in-out infinite;
        }

        .hs-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: #FF8000;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 128, 0, 0.7), 0 0 8px #FF8000;
        }

        .hs-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(16, 16, 16, 0.85);
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        @keyframes htPulse {
            0% {
                transform: scale(0.85);
                opacity: 1
            }

            50% {
                transform: scale(1.35);
                opacity: 0.3
            }

            100% {
                transform: scale(0.85);
                opacity: 1
            }
        }

        /* Info panel */
        .info-panel {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .info-panel.active {
            display: flex;
        }

        .info-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .info-card {
            position: relative;
            width: 100%;
            max-width: 480px;
            max-height: 70vh;
            overflow-y: auto;
            background: rgba(16, 16, 16, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: none;
            border-radius: 24px 24px 0 0;
            padding: 20px 24px 24px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5);
        }

        .info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .info-accent {
            width: 40px;
            height: 3px;
            background: #FF8000;
            border-radius: 99px;
        }

        .info-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            cursor: pointer;
            color: #fff;
        }

        .info-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-desc {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.7);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- A-Frame Scene with MindAR -->
    <a-scene
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
        color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true;" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false" loading-screen="enabled: false"
        style="position:fixed; inset:0; z-index:1;">
        <a-assets>
            <a-asset-item id="model" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Lights -->
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.2" position="2 3 2"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.4" position="-2 1 -1"></a-light>

        <!-- Image target anchor -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
            <!-- 3D model anchored to the tracked image -->
            <a-gltf-model src="#model" position="0 0.05 0" scale="0.15 0.15 0.15" rotation="0 0 0"
                id="ar-model"></a-gltf-model>

            <!-- Invisible hotspot marker entities for projection -->
            <a-entity id="hs-marker-doors" position="0.08 0.07 0.03"></a-entity>
            <a-entity id="hs-marker-engine" position="-0.03 0.1 -0.05"></a-entity>
            <a-entity id="hs-marker-aero" position="0 0.03 0.08"></a-entity>
            <a-entity id="hs-marker-interior" position="0 0.08 0"></a-entity>
        </a-entity>
    </a-scene>

    <!-- HUD -->
    <div class="ar-hud" id="ar-hud">
        <div>
            <div style="font-size:12px;font-weight:700;letter-spacing:6px;">McLAREN</div>
            <div style="font-size:10px;font-weight:500;letter-spacing:3px;color:#FF8000;">ARTURA SPIDER · AR</div>
        </div>
        <button class="ar-close-btn" onclick="window.location.href='/'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" />
            </svg>
        </button>
    </div>

    <!-- Scan prompt -->
    <div id="scan-prompt">Point camera at the AR marker card</div>

    <!-- Hotspot DOM layer -->
    <div id="hotspot-layer" class="hidden" style="position:fixed;inset:0;z-index:55;pointer-events:none;"></div>

    <!-- Info panel -->
    <div class="info-panel" id="info-panel">
        <div class="info-backdrop" onclick="closePanel()"></div>
        <div class="info-card">
            <div class="info-header">
                <div class="info-accent"></div>
                <button class="info-close" onclick="closePanel()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="info-title" id="panel-title"></div>
            <div class="info-desc" id="panel-desc"></div>
        </div>
    </div>

    <script>
        // ── Hotspot Data ────────────────────────
        const HOTSPOTS = [
            { id: 'doors', marker: 'hs-marker-doors', title: 'Dihedral Doors', desc: 'McLaren\'s signature dihedral doors rotate upward and outward, providing dramatic entrance and optimal entry/exit in tight spaces. Carbon fibre construction keeps weight minimal.' },
            { id: 'engine', marker: 'hs-marker-engine', title: '4.0L Twin-Turbo V8', desc: 'The heart of the Artura Spider: a 4.0-litre twin-turbocharged V8 producing 585PS, paired with an E-motor for combined output of 700PS. 0-60mph in 3.0 seconds.' },
            { id: 'aero', marker: 'hs-marker-aero', title: 'Active Aerodynamics', desc: 'Active rear wing and underbody aerodynamics generate up to 260kg of downforce. The airbrake function deploys automatically during high-speed braking.' },
            { id: 'interior', marker: 'hs-marker-interior', title: 'Driver-Focused Cockpit', desc: 'The minimalist cockpit wraps around the driver with a high-mounted infotainment display, configurable digital instrument cluster, and hand-stitched Alcantara throughout.' },
        ];

        let targetVisible = false;

        // ── Target Events ────────────────────────
        const targetEl = document.getElementById('target-anchor');

        targetEl.addEventListener('targetFound', () => {
            targetVisible = true;
            document.getElementById('scan-prompt').classList.add('hidden');
            document.getElementById('hotspot-layer').classList.remove('hidden');
        });

        targetEl.addEventListener('targetLost', () => {
            targetVisible = false;
            document.getElementById('hotspot-layer').classList.add('hidden');
            document.getElementById('scan-prompt').classList.remove('hidden');
        });

        // ── Create Hotspot DOM Elements ──────────
        const layer = document.getElementById('hotspot-layer');
        const hotspotEls = [];

        HOTSPOTS.forEach(hs => {
            const btn = document.createElement('button');
            btn.className = 'hs-btn';
            btn.innerHTML = `
        <div class="hs-ring">
          <div class="hs-ring-circle"></div>
          <div class="hs-dot"></div>
        </div>
        <span class="hs-label">${hs.title}</span>
      `;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openPanel(hs);
            });
            layer.appendChild(btn);
            hotspotEls.push({ hs, el: btn });
        });

        // ── Project Hotspots to Screen ──────────
        const scene = document.querySelector('a-scene');

        scene.addEventListener('loaded', () => {
            const camera = scene.camera;
            const renderer = scene.renderer;

            function updateHotspots() {
                if (!targetVisible || !camera || !renderer) {
                    requestAnimationFrame(updateHotspots);
                    return;
                }

                const w = window.innerWidth;
                const h = window.innerHeight;

                hotspotEls.forEach(({ hs, el }) => {
                    const markerEl = document.getElementById(hs.marker);
                    if (!markerEl || !markerEl.object3D) { el.style.display = 'none'; return; }

                    const pos = new THREE.Vector3();
                    markerEl.object3D.getWorldPosition(pos);
                    pos.project(camera);

                    const x = (pos.x * 0.5 + 0.5) * w;
                    const y = (-pos.y * 0.5 + 0.5) * h;

                    if (pos.z > 0 && pos.z < 1 && x > -60 && x < w + 60 && y > -60 && y < h + 60) {
                        el.style.display = '';
                        el.style.left = x + 'px';
                        el.style.top = y + 'px';
                    } else {
                        el.style.display = 'none';
                    }
                });

                requestAnimationFrame(updateHotspots);
            }

            updateHotspots();
        });

        // ── Panel ────────────────────────────────
        function openPanel(hs) {
            document.getElementById('panel-title').textContent = hs.title;
            document.getElementById('panel-desc').textContent = hs.desc;
            document.getElementById('info-panel').classList.add('active');
        }

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }
    </script>
</body>

</html>
